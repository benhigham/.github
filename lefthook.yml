pre-commit:
  commands:
    prettier:
      priority: 1
      glob: "**/*.{yml,yaml,md}"
      run: prettier --write {staged_files}
      stage_fixed: true
    actionlint:
      priority: 2
      glob: ".github/workflows/*.yml"
      run: actionlint {staged_files}
    yamllint:
      priority: 2
      glob: "**/*.{yml,yaml}"
      run: yamllint {staged_files}
    markdownlint:
      priority: 2
      glob: "**/*.md"
      run: markdownlint-cli2 --fix {staged_files}
      stage_fixed: true
