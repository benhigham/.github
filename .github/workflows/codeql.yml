# Security code scanning with CodeQL for multiple programming languages.
# Configurable languages, queries, and build modes for compiled languages.
name: CodeQL Security Scanning

on:
  workflow_call:
    inputs:
      languages:
        description: |
          Languages to analyze. Either a single language name (e.g. 'javascript')
          or a JSON array for multiple languages (e.g. '["javascript", "python"]').
          Supported: cpp, csharp, go, java, javascript, python, ruby, swift
        type: string
        default: 'javascript'
        required: false
      queries:
        description: |
          CodeQL query suite to run.
          Options: default, security-extended, security-and-quality
        type: string
        default: default
        required: false
      build-mode:
        description: |
          Build mode for compiled languages.
          Options: none, autobuild, manual
        type: string
        default: autobuild
        required: false

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Inputs
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Validate languages input
        uses: actions/github-script@v7
        env:
          INPUT_LANGUAGES: ${{ inputs.languages }}
        with:
          script: |
            const raw = process.env.INPUT_LANGUAGES;
            if (raw.startsWith('[')) {
              try {
                const parsed = JSON.parse(raw);
                if (!Array.isArray(parsed) || parsed.length === 0) {
                  core.setFailed('languages input must be a non-empty JSON array (e.g. \'["javascript","python"]\') or a single language name');
                }
              } catch (e) {
                core.setFailed(`languages input is not valid JSON: ${e.message}. Expected a JSON array (e.g. '["javascript","python"]') or a single language name.`);
              }
            }

  analyze:
    name: CodeQL Analysis
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: ${{ startsWith(inputs.languages, '[') && fromJSON(inputs.languages) || fromJSON(format('["{0}"]', inputs.languages)) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: ${{ inputs.queries }}
          build-mode: ${{ inputs.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
