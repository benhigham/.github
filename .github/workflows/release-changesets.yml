# Automated release workflow using Changesets for version management and npm publishing.
# Uses npm Trusted Publishers (OIDC) for authentication via pnpm's native support (>= 10.7.0).
# Requires each package to be registered as a trusted publisher on npmjs.com.
name: Release changesets

on:
  workflow_call:
    inputs:
      needs-build:
        description: Whether to run the build step before publishing
        type: boolean
        default: false
      version-command:
        description: The command to update version, edit CHANGELOG, read and delete changesets
        type: string
        default: pnpm run version
      publish-command:
        description: The command to publish packages
        type: string
        default: pnpm run release
      commit-message:
        description: Commit message for the version bump
        type: string
        default: "chore(release): bump package versions"
      pr-title:
        description: Title of the pull request
        type: string
        default: "chore(release): create new release"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  attestations: write
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Build packages
        if: inputs.needs-build
        run: pnpm run build
        timeout-minutes: 5

      - name: Create and publish a new release
        uses: changesets/action@v1
        with:
          version: ${{ inputs.version-command }}
          publish: ${{ inputs.publish-command }}
          commit: ${{ inputs.commit-message }}
          title: ${{ inputs.pr-title }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
