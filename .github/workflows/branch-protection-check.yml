# Validates branch protection settings weekly and creates issues if configuration problems are found.
# Checks for required settings like PR reviews, status checks, and other security configurations.
name: Branch Protection Check

on:
  schedule:
    - cron: "0 0 * * 1" # Weekly on Monday
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to check protection for'
        type: string
        default: 'main'
        required: false
  workflow_call:
    inputs:
      branch:
        description: 'Branch to check protection for'
        type: string
        default: 'main'
        required: false

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check Branch Protection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check branch protection rules
        uses: actions/github-script@v7
        env:
          INPUT_BRANCH: ${{ inputs.branch }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = process.env.INPUT_BRANCH || 'main';
            console.log(`Checking branch protection for: ${branch} (source: ${process.env.INPUT_BRANCH ? 'input' : 'default'})`);

            async function findOrCreateIssue(titleFragment, issueBody, labels) {
              try {
                const { data: existingIssues } = await github.rest.issues.listForRepo({
                  owner,
                  repo,
                  state: 'open',
                  labels: labels,
                  per_page: 100
                });

                const existingIssue = existingIssues.find(issue =>
                  issue.title.includes(titleFragment)
                );

                if (existingIssue) {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: existingIssue.number,
                    body: `## 🔄 Updated Check Results\n\n${issueBody}`
                  });
                  console.log(`Updated existing issue #${existingIssue.number}`);
                } else {
                  await github.rest.issues.create({
                    owner,
                    repo,
                    title: `${titleFragment} for ${branch}`,
                    body: issueBody,
                    labels: labels
                  });
                  console.log('Created new issue');
                }
              } catch (issueError) {
                core.error(`Failed to create/update issue "${titleFragment}": ${issueError.message} (status: ${issueError.status || 'unknown'})`);
              }
            }

            let protection;
            try {
              ({ data: protection } = await github.rest.repos.getBranchProtection({
                owner,
                repo,
                branch: branch
              }));
            } catch (error) {
              if (error.status === 403) {
                core.setFailed(`Insufficient permissions to read branch protection for ${branch}. Ensure the token has admin access.`);
                return;
              }
              if (error.status !== 404) throw error;

              console.error(`❌ No branch protection found for ${branch}`);
              const issueBody = [
                `## Branch Protection Missing\n`,
                `Branch protection is not configured for \`${branch}\`.\n`,
                `**Recommended settings:**`,
                `- Require pull request reviews`,
                `- Require status checks to pass`,
                `- Enforce rules for administrators`,
                `- Require linear history`,
                `\n---`,
                `*Automated check run on ${new Date().toISOString()}*`,
              ].join('\n');

              await findOrCreateIssue('Branch Protection Not Configured', issueBody, ['security', 'branch-protection', 'priority: high']);
              core.setFailed(`Branch protection is not configured for ${branch}`);
              return;
            }

            console.log('Branch protection is enabled for', branch);

            const issues = [];
            if (!protection.required_pull_request_reviews) {
              issues.push('Pull request reviews are not required');
            }
            if (!protection.enforce_admins?.enabled) {
              issues.push('Rules do not apply to administrators');
            }
            if (!protection.required_status_checks) {
              issues.push('No required status checks configured');
            }

            if (issues.length > 0) {
              console.log('\nIssues found:');
              issues.forEach(issue => console.log(`- ${issue}`));

              const issueBody = [
                `## Branch Protection Check Results\n`,
                `The following issues were found with branch protection for \`${branch}\`:\n`,
                issues.map(i => `- ${i}`).join('\n'),
                `\n**Recommendations:**`,
                `- Enable pull request reviews`,
                `- Apply rules to administrators`,
                `- Configure required status checks`,
                `\n---`,
                `*Automated check run on ${new Date().toISOString()}*`,
              ].join('\n');

              await findOrCreateIssue('Branch Protection Configuration Issues', issueBody, ['security', 'branch-protection', 'chore']);
              core.setFailed(`Branch protection issues found for ${branch}: ${issues.join('; ')}`);
            } else {
              console.log('\nAll branch protection checks passed!');
            }
