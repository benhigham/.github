# Welcomes first-time contributors with a friendly message on their first PR or issue.
name: First-Time Contributor Greeter

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}
  cancel-in-progress: false

jobs:
  greeting:
    name: Greet First-Time Contributors
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Greet first-time contributors
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const is_pr = context.eventName === 'pull_request_target';

            if (!issue_number) {
              core.warning('Could not determine issue/PR number from context, skipping');
              return;
            }

            if (!context.payload.sender) {
              core.setFailed('Event payload is missing sender information');
              return;
            }

            const author = context.payload.sender.login;

            try {
              // Use the search API for both PRs and issues for consistent detection.
              // total_count includes the current PR/issue, so first-time means exactly 1.
              const q = is_pr
                ? `repo:${owner}/${repo} is:pr author:${author}`
                : `repo:${owner}/${repo} is:issue author:${author}`;
              const { data } = await github.rest.search.issuesAndPullRequests({
                q,
                per_page: 1,
              });
              const isFirstTime = data.total_count <= 1;

              if (isFirstTime) {
                const message = is_pr
                  ? [
                    'Thanks for opening your first pull request! We\'re excited to have you contribute.',
                    '',
                    'A maintainer will review your PR soon. In the meantime, please make sure:',
                    '- [ ] Your code follows the project\'s style guidelines',
                    '- [ ] You\'ve added tests if applicable',
                    '- [ ] You\'ve updated documentation if needed',
                    '- [ ] All CI checks pass',
                    '',
                    'Feel free to ask questions if you need any help!',
                  ].join('\n')
                  : [
                    'Thanks for opening your first issue! We appreciate you taking the time to report this.',
                    '',
                    'A maintainer will review your issue and respond as soon as possible. To help us address this quickly, please make sure you\'ve provided:',
                    '- A clear description of the issue',
                    '- Steps to reproduce (if applicable)',
                    '- Any relevant context or screenshots',
                    '',
                    'Thanks for contributing to the project!',
                  ].join('\n');

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue_number,
                  body: message
                });

                console.log(`Greeted first-time contributor: ${author}`);
              } else {
                console.log(`Not a first-time contributor: ${author}`);
              }
            } catch (error) {
              if (error.status === 403) {
                core.setFailed(`Insufficient permissions to check/greet ${author}: ${error.message}`);
              } else {
                core.setFailed(`Failed to check/greet contributor ${author}: ${error.message}`);
              }
            }
