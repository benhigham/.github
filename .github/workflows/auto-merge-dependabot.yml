# Automatically approves and merges Dependabot PRs based on semantic versioning rules.
# Supports configurable merge methods. Patch and minor auto-merge enabled by default; major updates require manual review.
#
# Note: The concurrency group uses the caller's workflow name (not this reusable workflow's name),
# so each caller gets its own concurrency scope.
name: Auto-merge Dependabot PRs

on:
  workflow_call:
    inputs:
      enable-auto-merge:
        description: Whether to enable auto-merge for Dependabot PRs
        type: boolean
        default: true
        required: false
      merge-method:
        description: 'The merge method to use. Valid values: merge, squash, rebase'
        type: string
        default: squash
        required: false
      auto-merge-patch:
        description: Auto-merge patch version updates
        type: boolean
        default: true
        required: false
      auto-merge-minor:
        description: Auto-merge minor version updates
        type: boolean
        default: true
        required: false
      auto-merge-major:
        description: Auto-merge major version updates
        type: boolean
        default: false
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  auto-merge:
    name: Auto-merge Dependabot PR
    if: github.actor == 'dependabot[bot]' && inputs.enable-auto-merge
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate merge-method input
        env:
          MERGE_METHOD: ${{ inputs.merge-method }}
        run: |
          case "$MERGE_METHOD" in
            merge|squash|rebase) ;;
            *) echo "::error::Invalid merge-method '$MERGE_METHOD'. Must be one of: merge, squash, rebase"; exit 1 ;;
          esac

      - name: Get Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify metadata extraction
        if: steps.metadata.outputs.update-type == ''
        run: |
          echo "::error::Failed to extract Dependabot metadata — update-type is empty. The dependabot/fetch-metadata action may have failed silently."
          exit 1

      - name: Check merge conditions
        id: check
        if: |
          (inputs.auto-merge-patch && steps.metadata.outputs.update-type == 'version-update:semver-patch') ||
          (inputs.auto-merge-minor && steps.metadata.outputs.update-type == 'version-update:semver-minor') ||
          (inputs.auto-merge-major && steps.metadata.outputs.update-type == 'version-update:semver-major')
        run: echo "matched=true" >> "$GITHUB_OUTPUT"

      - name: Verify auto-merge is enabled
        if: steps.check.outputs.matched == 'true'
        run: |
          if ! AUTO_MERGE=$(gh api "repos/${{ github.repository }}" --jq '.allow_auto_merge' 2>&1); then
            echo "::error::Failed to query repository settings via GitHub API. Response: ${AUTO_MERGE}"
            exit 1
          fi
          if [ "$AUTO_MERGE" != "true" ]; then
            echo "::error::Auto-merge is not enabled for this repository. Enable it in Settings > General > Pull Requests > Allow auto-merge."
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve Dependabot PR
        id: approve
        if: steps.check.outputs.matched == 'true'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.check.outputs.matched == 'true' && steps.approve.outcome == 'success'
        run: gh pr merge --auto "--${MERGE_METHOD}" "$PR_URL"
        env:
          MERGE_METHOD: ${{ inputs.merge-method }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail — approval failed
        if: steps.check.outputs.matched == 'true' && steps.approve.outcome == 'failure'
        run: |
          echo "::error::PR approval failed. Check the 'Approve Dependabot PR' step logs for details."
          exit 1

      - name: Fail — no merge condition matched
        if: steps.check.outputs.matched != 'true'
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        run: |
          echo "::error::No auto-merge condition matched. update-type=${UPDATE_TYPE}. PR left unapproved and without auto-merge; manual review required."
          exit 1
