# Validates pull request titles follow conventional commit format.
# Helps maintain consistent commit history when using squash merges.
name: PR Title Check

on:
  workflow_call:
    inputs:
      pattern:
        description: |
          Regex pattern for valid PR titles.
          Default enforces conventional commits: type(scope): description
        type: string
        default: '^(feat|fix|docs|chore|refactor|test|perf|ci|build|style)(\(.+\))?: .+'
        required: false
      require-scope:
        description: |
          Whether to require a scope in the commit type.
          When true, modifies the default pattern to make the scope group mandatory.
        type: boolean
        default: false
        required: false

permissions:
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check PR title format
        uses: actions/github-script@v7
        env:
          INPUT_PATTERN: ${{ inputs.pattern }}
          REQUIRE_SCOPE: ${{ inputs.require-scope }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const title = context.payload.pull_request.title;
            const requireScope = process.env.REQUIRE_SCOPE === 'true';

            // When require-scope is true, make the optional scope group mandatory
            let pattern = process.env.INPUT_PATTERN;
            if (requireScope) {
              const original = pattern;
              pattern = pattern.replace('(\\(.+\\))?', '(\\(.+\\))');
              if (pattern === original) {
                core.warning('require-scope is true but the pattern does not contain the default scope group — scope requirement has no effect with custom patterns');
              }
            }

            let regex;
            try {
              regex = new RegExp(pattern);
            } catch (regexError) {
              core.setFailed(`Invalid regex pattern "${pattern}": ${regexError.message}. Check the 'pattern' input to this workflow.`);
              return;
            }

            // Find existing bot comment (used in both pass and fail paths)
            let botComment;
            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number: context.payload.pull_request.number,
              });
              botComment = comments.find(c =>
                c.user.type === 'Bot' && c.body.includes('PR Title Format Check Failed')
              );
            } catch (commentError) {
              core.warning(`Failed to list PR comments: ${commentError.message}`);
            }

            if (!regex.test(title)) {
              const scopeNote = requireScope
                ? '\n\n**Note:** A scope is required for this repository.'
                : '\n\n**Note:** Scope is optional but recommended.';

              const comment = [
                '❌ **PR Title Format Check Failed**',
                '',
                'Your PR title does not follow the conventional commit format.',
                '',
                `**Current title:** \`${title}\``,
                '',
                '**Expected format:** `type(scope): description`',
                '',
                '**Valid types:**',
                '- `feat` - New features',
                '- `fix` - Bug fixes',
                '- `docs` - Documentation changes',
                '- `chore` - Maintenance tasks',
                '- `refactor` - Code refactoring',
                '- `test` - Adding or updating tests',
                '- `perf` - Performance improvements',
                '- `ci` - CI/CD changes',
                '- `build` - Build system changes',
                '- `style` - Code style changes (formatting, etc.)',
                scopeNote,
                '',
                '**Examples:**',
                '- `feat(auth): add social login support`',
                '- `fix(api): handle null response from server`',
                '- `docs: update installation instructions`',
                '- `chore(deps): update dependencies`',
                '',
                'Please update your PR title to match this format.',
              ].join('\n');

              try {
                if (botComment) {
                  await github.rest.issues.updateComment({
                    owner,
                    repo,
                    comment_id: botComment.id,
                    body: comment,
                  });
                } else {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: context.payload.pull_request.number,
                    body: comment,
                  });
                }
              } catch (commentError) {
                core.warning(`Failed to post failure comment: ${commentError.message}`);
              }

              core.setFailed('PR title does not follow conventional commit format');
            } else {
              // Clean up any previous failure comment
              if (botComment) {
                try {
                  await github.rest.issues.deleteComment({
                    owner,
                    repo,
                    comment_id: botComment.id,
                  });
                } catch (cleanupError) {
                  core.warning(`Failed to clean up previous comment: ${cleanupError.message}`);
                }
              }

              console.log(`PR title is valid: ${title}`);
            }
